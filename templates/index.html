<!DOCTYPE html>
<html>
<head>
    <title>Dot Code System</title>
</head>
<body>

<h2>Generate</h2>

<form action="/generate" method="post" target="_blank">
    Text: <input name="text"><br><br>
    Dot Color: <input type="color" name="dot_color"><br><br>
    BG Color: <input type="color" name="bg_color"><br><br>
    <button type="submit">Generate</button>
</form>

<hr>

<h2>Scan</h2>

<input type="file" id="image">
<button onclick="upload()">Scan</button>

<p id="result"></p>

<hr>

<h2>Camera</h2>
<video id="video" width="300" autoplay></video><br>
<button onclick="capture()">Capture</button>

<script>
const video = document.getElementById('video');

navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => video.srcObject = stream);

function upload() {
    let file = document.getElementById('image').files[0];
    send(file);
}

function capture() {
    const canvas = document.createElement('canvas');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0);

    canvas.toBlob(blob => send(blob));
}

function send(blob) {
    let formData = new FormData();
    formData.append("image", blob);

    fetch('/scan', {
        method: 'POST',
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById('result').innerText =
            "Decoded: " + data.decoded_text;
    });
}
</script>

</body>
</html>

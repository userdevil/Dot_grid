<!DOCTYPE html>
<html>
<head>
    <title>Radial Dot Code</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
            background: #f5f5f5;
        }
        input, button {
            margin: 5px;
            padding: 6px;
        }
        video {
            margin-top: 10px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<h2>🎨 Generate Code</h2>

<form action="/generate" method="post" target="_blank">
    Text: <input name="text" value="Hello World"><br>
    Dot Color: <input type="color" name="dot_color" value="#000000"><br>
    BG Color: <input type="color" name="bg_color" value="#f5f5f5"><br>
    <button type="submit">Generate</button>
</form>

<hr>

<h2>📤 Upload Scan</h2>
<input type="file" id="image">
<button onclick="upload()">Scan</button>

<p id="result"></p>

<hr>

<h2>📷 Camera Scan</h2>
<video id="video" width="300" autoplay></video><br>
<button onclick="capture()">Capture</button>

<script>
const video = document.getElementById('video');

navigator.mediaDevices.getUserMedia({ video: true })
.then(stream => video.srcObject = stream);

function upload() {
    let file = document.getElementById('image').files[0];
    send(file);
}

function capture() {
    const canvas = document.createElement('canvas');
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0);

    canvas.toBlob(blob => send(blob));
}

function send(blob) {
    let formData = new FormData();
    formData.append("image", blob);

    fetch('/scan', {
        method: 'POST',
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById('result').innerText =
            "Decoded: " + data.decoded_text;
    });
}
</script>

</body>
</html>
